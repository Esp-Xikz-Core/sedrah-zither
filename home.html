<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB81OqdbTMkwLw7i51X95bRQftoFAItth8",
    authDomain: "sedrah-zither-auth.firebaseapp.com",
    projectId: "sedrah-zither-auth",
    storageBucket: "sedrah-zither-auth.firebasestorage.app",
    messagingSenderId: "1043486278925",
    appId: "1:1043486278925:web:be02b229249a6911165c44"
  };
  
  firebase.initializeApp(firebaseConfig);

  // LISTA DE QUEM PODE ACESSAR (Adicione os e-mails dos clientes aqui)
  const listaAutorizada = ["lorenzzob21@gmail.com"];

  // SEGURANÇA MÁXIMA: Verifica o usuário antes de mostrar a página
  firebase.auth().onAuthStateChanged((user) => {
    if (!user || !listaAutorizada.includes(user.email)) {
      // Se não estiver logado ou não estiver na lista, expulsa na hora
      window.location.href = "index.html";
    } else {
      // Se estiver tudo certo, mostra o conteúdo
      document.body.style.display = "block";
    }
  });
</script>

<style>
  /* Esconde o corpo da página enquanto o Firebase verifica o login */
  body { display: none; }
</style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sedrah Zither - Principal</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
    }

    #banner img {
      width: 100%;
      height: auto;
      display: block;
      border-bottom: 2px solid #888;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #ccc;
      padding: 10px;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
      justify-content: center;
    }

    nav ul li a {
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    #content-area {
      padding: 100px 20px 20px;
    }

    button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 200px;
      font-size: 16px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Banner com imagem -->
  <div id="banner">
    <img src="provas/SEDRAH ZITHER.png" alt="Banner Sedrah Zither" />
  </div>

  <!-- Menu de navegação fixo -->
  <nav>
    <ul>
      <li><a href="#" onclick="showSection('arquivos')">Arquivos</a></li>
      <li><a href="#" onclick="showSection('contato')">Contato</a></li>
      <li><a href="#" onclick="showSection('premium')">Premium</a></li>
    </ul>
  </nav>

  <!-- Área onde o conteúdo será exibido -->
  <div id="content-area"></div>

  <!-- Seções ocultas para clonar -->
  <div id="arquivos" class="hidden">
    <button onclick="location.href='pages/conta.html'">Arquivo Conta (c)</button>
    <button onclick="location.href='pages/video.html'">Arquivo Vídeo (v)</button>
    <button onclick="location.href='pages/pessoa.html'">Arquivo Pessoa (p)</button>
    <button onclick="location.href='pages/foto.html'">Arquivo Foto (f)</button>
    <button onclick="location.href='pages/caso.html'">Arquivo Caso (ca)</button>
    <button onclick="location.href='pages/supercaso.html'">Arquivo Super Caso (sca)</button>
  </div>

  <div id="contato" class="hidden">
    <p>Telefone 1: (31) 99999-1234</p>
    <p>Telefone 2: (31) 98888-5678</p>
  </div>

  <div id="premium" class="hidden">
    <!-- Conteúdo em branco -->
  </div>

  <!-- Script para trocar seções -->
  <script>
    function showSection(id) {
      const contentArea = document.getElementById("content-area");
      contentArea.innerHTML = ""; // Limpa conteúdo anterior

      const section = document.getElementById(id);
      if (section) {
        const clone = section.cloneNode(true);
        clone.classList.remove("hidden");
        contentArea.appendChild(clone);
      }
    }
  </script>
</body>
</html>
