<!DOCTYPE html>
<html>
<head>
  <title>Gerador de Chaves - Sedrah Zither</title>
  <style>
    body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 50px; }
    #key-display { font-size: 40px; border: 2px dashed #0f0; padding: 20px; margin: 20px; display: none; }
    button { padding: 15px; cursor: pointer; background: #0f0; color: #000; font-weight: bold; }
  </style>
</head>
<body>
  <h1>GERADOR DE ACESSO DIÁRIO</h1>
  <button id="btnGerar">LOGAR E GERAR CHAVE</button>
  <div id="key-display"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = { /* SUA CONFIG AQUI */ };
    firebase.initializeApp(firebaseConfig);
    
    document.getElementById("btnGerar").onclick = () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider).then(res => {
        if (res.user.email === "lorenzzob21@gmail.com") { // SEU GMAIL
          // Gera chave no padrão: SZ-XXXX (Ex: SZ-4829)
          const num = Math.floor(1000 + Math.random() * 9000);
          const chave = "SZ-" + num;

          // Salva no banco para o App reconhecer
          firebase.database().ref('chaves_diarias/' + chave).set({
            utilizada: false,
            data: new Date().toLocaleDateString()
          }).then(() => {
            document.getElementById("btnGerar").style.display = "none";
            document.getElementById("key-display").style.display = "block";
            document.getElementById("key-display").innerText = "SUA CHAVE: " + chave;
          });
        } else { alert("Não autorizado"); }
      });
    };
  </script>
</body>
</html>
