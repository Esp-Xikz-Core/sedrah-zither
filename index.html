<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Acesso Jeep Rubi</title>
  <style>
    body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 100px; }
    #painel-privado { display: none; } /* Escondido até logar */
    .btn-gerar { background: #28a745; color: white; border: none; padding: 20px 40px; border-radius: 5px; cursor: pointer; font-size: 20px; font-weight: bold; }
    #token-box { font-size: 50px; border: 2px solid #0f0; display: inline-block; padding: 20px; margin-top: 20px; background: #111; }
  </style>
</head>
<body>

  <div id="status">Verificando identidade com o Google...</div>

  <div id="painel-privado">
    <h1>BEM-VINDO, LORENZZO</h1>
    <p>Clique abaixo para criar sua chave de acesso ao App:</p>
    <button class="btn-gerar" id="btnGerar">GERAR CHAVE SZ</button>
    
    <div id="area-resultado" style="display:none">
      <p>Sua chave única de hoje:</p>
      <div id="token-box">------</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB81OqdbTMkwLw7i51X95bRQftoFAItth8",
      authDomain: "sedrah-zither-auth.firebaseapp.com",
      databaseURL: "https://sedrah-zither-auth-default-rtdb.firebaseio.com",
      projectId: "sedrah-zither-auth",
      storageBucket: "sedrah-zither-auth.firebasestorage.app",
      messagingSenderId: "1043486278925",
      appId: "1:1043486278925:web:be02b229249a6911165c44"
    };
    
    firebase.initializeApp(firebaseConfig);
    const provider = new firebase.auth.GoogleAuthProvider();

    // 1. ASSIM QUE ABRE: Já pede o login
    firebase.auth().signInWithPopup(provider).then(result => {
      const user = result.user;
      const autorizados = ["lorenzzob21@gmail.com"]; //

      if (autorizados.includes(user.email)) {
        document.getElementById("status").style.display = "none";
        document.getElementById("painel-privado").style.display = "block";
      } else {
        document.getElementById("status").innerText = "ACESSO NEGADO: E-MAIL NÃO AUTORIZADO";
        firebase.auth().signOut();
      }
    }).catch(err => {
      document.getElementById("status").innerText = "Erro ao conectar: " + err.message;
    });

    // 2. AÇÃO DO BOTÃO: Gera a chave no banco
    document.getElementById("btnGerar").onclick = () => {
      const num = Math.floor(1000 + Math.random() * 9000);
      const chave = "SZ-" + num;

      firebase.database().ref('chaves_diarias/' + chave).set({
        utilizada: false,
        criadoEm: Date.now()
      }).then(() => {
        document.getElementById("btnGerar").style.display = "none";
        document.getElementById("area-resultado").style.display = "block";
        document.getElementById("token-box").innerText = chave;
      });
    };
  </script>
</body>
</html>
